name: Robo SEI SEC-BA

on:
  schedule:
    # O cron agenda o horário. Os servidores rodam no fuso UTC (Londres).
    # Como você está na Bahia (UTC-3), para rodar às 08:00h da manhã aí, 
    # precisamos agendar para as 11:00h no UTC.
    # A sintaxe "0 11 * * 1-5" significa: Minuto 0, Hora 11, de Segunda(1) a Sexta(5).
    - cron: '0 10,19 * * 1-5' 
    
  workflow_dispatch: # Essa linha mágica cria um botão para rodarmos manualmente quando quisermos testar!

jobs:
  executar-robo:
    runs-on: ubuntu-latest # A máquina virtual da nuvem

    steps:
    - name: Baixar o código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar bibliotecas e o Playwright
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps

    - name: Rodar a Automação
      env: # Injetando os segredos do cofre direto nas variáveis do Python
        USUARIO_SEI: ${{ secrets.USUARIO_SEI }}
        SENHA_SEI: ${{ secrets.SENHA_SEI }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python main.py
